<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CMK Artsclass | 보안 아카이브</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        .bg-cmk-blue { background-color: #007AFF; }
        .text-cmk-blue { color: #007AFF; }
        #main-content { display: none; } /* 인증 전까지 숨김 */
        .gate-input { border-bottom: 2px solid white; background: transparent; text-align: center; font-size: 2rem; outline: none; }
    </style>
</head>
<body class="bg-gray-50">

    <div id="secure-gate" class="fixed inset-0 z-[100] bg-cmk-blue flex flex-col items-center justify-center text-white p-6">
        <div class="mb-10 text-center">
            <h1 class="text-3xl font-black italic mb-2">CMK Artsclass</h1>
            <p class="opacity-80">행사 참여 코드를 입력해주세요.</p>
        </div>
        <input type="password" id="passcode" class="gate-input w-48 mb-8" maxlength="4" placeholder="****">
        <button onclick="checkPasscode()" class="bg-white text-cmk-blue px-10 py-3 rounded-full font-bold hover:bg-gray-100 transition">접속하기</button>
        <p id="error-msg" class="mt-4 text-red-300 text-sm hidden">코드가 일치하지 않습니다.</p>
    </div>

    <div id="main-content">
        <nav class="fixed top-0 w-full z-50 bg-white/90 backdrop-blur-md border-b py-4 px-6 flex justify-between items-center">
            <img src="주최_현대차 정몽구 재단.png" class="h-7 md:h-8">
            <div class="flex items-center gap-4">
                <button onclick="openCheckIn()" class="bg-cmk-blue text-white px-4 py-2 rounded-lg text-xs font-bold shadow-lg">출석 확인</button>
                <a href="javascript:location.reload()" class="text-xs font-bold text-gray-400 italic">LOGOUT</a>
            </div>
        </nav>

        <section class="pt-32 pb-20 px-6 text-center">
             <h2 class="text-2xl font-black italic text-cmk-blue">WELCOME, TEACHER!</h2>
             <p class="text-gray-500 mt-2">오늘 연수도 예술과 함께 행복한 시간 되세요.</p>
        </section>
        
        <section id="attendance" class="py-10 bg-blue-50 mx-6 rounded-[2rem] hidden">
            <div class="max-w-md mx-auto text-center p-8">
                <h3 class="font-bold text-xl mb-4">오늘의 출석 확인</h3>
                <input type="text" id="teacher-name" placeholder="성함" class="w-full p-3 mb-2 rounded-lg border">
                <input type="text" id="teacher-school" placeholder="소속 학교" class="w-full p-3 mb-4 rounded-lg border">
                <button onclick="submitAttendance()" class="w-full bg-cmk-blue text-white py-3 rounded-lg font-bold">출석 완료</button>
            </div>
        </section>
    </div>

    <script>
        // 1. 보안 코드 확인 로직
        function checkPasscode() {
            const code = document.getElementById('passcode').value;
            if(code === "1234") { // 실제 코드로 변경하세요
                document.getElementById('secure-gate').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
            } else {
                document.getElementById('error-msg').classList.remove('hidden');
            }
        }

        // 2. 출석 체크 열기
        function openCheckIn() {
            const section = document.getElementById('attendance');
            section.classList.toggle('hidden');
            window.scrollTo({ top: section.offsetTop - 100, behavior: 'smooth' });
        }

        // 3. 데이터 저장 로직 (Google Sheets 연결 시 활용)
        function submitAttendance() {
            const name = document.getElementById('teacher-name').value;
            const school = document.getElementById('teacher-school').value;
            
            if(!name || !school) {
                alert("정보를 모두 입력해주세요.");
                return;
            }

            alert(`${name} 선생님, 출석이 완료되었습니다!`);
            // 여기에 Google Sheets API 전송 코드를 넣습니다.
            document.getElementById('attendance').classList.add('hidden');
        }
    </script>
</body>
</html>
