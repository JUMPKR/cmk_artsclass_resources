<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2025 온드림 아츠클래스 자료실</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; word-break: keep-all; }
        .bg-ondream-blue { background-color: #1A73E8; } /* 포스터의 메인 블루 */
        .text-ondream-blue { color: #1A73E8; }
        .skew-title { transform: skew(-5deg) rotate(-1deg); } /* 포스터 타이틀 느낌 */
        .shape-curve { border-radius: 0 0 50% 50% / 0 0 10% 10%; }
    </style>
</head>
<body class="bg-gray-50">

    <header class="bg-white py-4 px-6 sticky top-0 z-50 shadow-sm">
        <div class="container mx-auto flex justify-between items-center">
            <img src="주최_현대차 정몽구 재단.png" alt="현대차 정몽구 재단" class="h-8 md:h-10">
            <nav class="hidden md:flex space-x-6 text-sm font-bold text-gray-600">
                <a href="#" class="hover:text-blue-600">프로그램 소개</a>
                <a href="#" class="text-blue-600">교육 자료실</a>
            </nav>
        </div>
    </header>

    <section class="bg-ondream-blue text-white py-20 px-6 relative overflow-hidden">
        <div class="absolute top-0 right-0 w-64 h-64 bg-white opacity-10 rounded-full -mr-20 -mt-20"></div>
        
        <div class="container mx-auto relative z-10 text-center">
            <p class="text-lg mb-4 font-bold tracking-tighter opacity-90">창의예술교육 교사연수 프로그램</p>
            <h1 class="text-5xl md:text-7xl font-900 mb-8 skew-title inline-block bg-white text-ondream-blue px-6 py-2">
                온드림 아츠클래스
            </h1>
            <h2 class="text-2xl md:text-3xl font-bold mt-4">자료실</h2>
        </div>
    </section>

    <div class="container mx-auto px-6 -mt-8 relative z-20">
        <div class="bg-white p-4 rounded-xl shadow-xl flex flex-col md:flex-row gap-4">
            <input type="text" placeholder="필요한 교육 자료를 검색하세요" class="flex-grow p-4 bg-gray-100 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            <button class="bg-ondream-blue text-white px-10 py-4 rounded-lg font-bold hover:bg-blue-700 transition">검색하기</button>
        </div>
    </div>

    <main class="container mx-auto py-16 px-6">
        <div class="flex items-center justify-between mb-10">
            <h3 class="text-2xl font-bold border-l-8 border-ondream-blue pl-4">전체 자료</h3>
            <span class="text-gray-500">총 12개의 자료가 있습니다.</span>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <div class="bg-white border-2 border-gray-100 rounded-3xl overflow-hidden hover:border-ondream-blue transition-all group">
                <div class="p-8">
                    <div class="text-xs font-bold text-blue-500 mb-2 uppercase tracking-widest">ARTIS Curriculum</div>
                    <h4 class="text-xl font-bold mb-4 group-hover:text-ondream-blue transition">2025 교사연수 가이드북</h4>
                    <p class="text-gray-500 text-sm leading-relaxed mb-6">포스터에 명시된 신규/알럼나이 교사 프로그램을 위한 통합 예술교육 매뉴얼입니다.</p>
                    <a href="#" class="flex items-center justify-center bg-gray-100 group-hover:bg-ondream-blue group-hover:text-white py-3 rounded-xl font-bold transition">
                        자료 다운로드
                    </a>
                </div>
            </div>
            </div>
    </main>

    <footer class="bg-white border-t border-gray-200 py-16">
        <div class="container mx-auto px-6">
            <div class="flex flex-col md:flex-row justify-center items-center gap-10 md:gap-20 mb-12">
                <div class="text-center">
                    <p class="text-[10px] text-gray-400 font-bold mb-3 uppercase tracking-tighter">주최</p>
                    <img src="주최_현대차 정몽구 재단.png" alt="재단" class="h-8 grayscale hover:grayscale-0 transition opacity-80 hover:opacity-100 mx-auto">
                </div>
                <div class="text-center">
                    <p class="text-[10px] text-gray-400 font-bold mb-3 uppercase tracking-tighter">주관</p>
                    <img src="로고_점프.png" alt="점프" class="h-8 grayscale hover:grayscale-0 transition opacity-80 hover:opacity-100 mx-auto">
                </div>
                <div class="text-center">
                    <p class="text-[10px] text-gray-400 font-bold mb-3 uppercase tracking-tighter">교육</p>
                    <img src="Logo_MASTER_Artis_logo_red.jpg" alt="Artis" class="h-10 grayscale hover:grayscale-0 transition opacity-80 hover:opacity-100 mx-auto">
                </div>
            </div>

            <div class="flex flex-wrap justify-center gap-4 text-xs font-bold text-gray-500 border-t pt-8">
                <span>주최 : 현대차 정몽구 재단</span>
                <span class="text-gray-300">|</span>
                <span>주관 : 사단법인 점프</span>
                <span class="text-gray-300">|</span>
                <span>교육 : 영국 ARTIS</span>
            </div>
            <p class="text-center text-[10px] text-gray-400 mt-6 tracking-widest uppercase">© 2025 ONDREAM ARTS CLASS ARCHIVE</p>
        </div>
    </footer>

</body>
</html>
